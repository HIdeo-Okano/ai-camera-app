<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI画像解析</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
    button { padding: 12px 20px; font-size: 16px; margin: 8px 0; width: 100%; }
    #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
    img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>📷 AI画像解析</h2>

  <!-- カメラまたはファイルから画像を取得 -->
  <input type="file" id="imageInput" accept="image/*" capture="environment">
  <img id="preview" style="display:none">
  
  <button onclick="analyzeImage()">🔍 AIで解析する</button>
  
  <div id="result">ここに解析結果が表示されます</div>

  <script>
    const API_KEY ='sk-ant-api03-AbCdEfGhIjKlMnOpQrStUvWxYz123456789';
    let base64Image = '';

    // 画像選択時にプレビュー表示
    document.getElementById('imageInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = function(ev) {
        base64Image = ev.target.result.split(',')[1]; // base64部分だけ取得
        const preview = document.getElementById('preview');
        preview.src = ev.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    // Claude APIで画像解析
    async function analyzeImage() {
      if (!base64Image) {
        alert('先に画像を選択してください');
        return;
      }
      
      document.getElementById('result').textContent = '解析中...';

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': API_KEY,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-opus-4-5',
            max_tokens: 1024,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: {
                    type: 'base64',
                    media_type: 'image/jpeg',
                    data: base64Image
                  }
                },
                {
                  type: 'text',
                  text: 'この画像を日本語で詳しく説明してください。'
                }
              ]
            }]
          })
        });

        const data = await response.json();
        document.getElementById('result').textContent = data.content[0].text;

      } catch (error) {
        document.getElementById('result').textContent = 'エラー: ' + error.message;
      }
    }
  </script>
</body>
</html>
